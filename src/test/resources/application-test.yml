server:
  port: 0  # 随机端口，避免测试冲突

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    # 使用独立的测试数据库（需要手动创建 design_test 库）
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_TEST_DATABASE:design_test}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

  # Redis 配置（测试时可以不配，验证降级）
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
